apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-emotion-journal-backend
  labels:
    app: smart-emotion-journal-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smart-emotion-journal-backend
  template:
    metadata:
      labels:
        app: smart-emotion-journal-backend
    spec:
      containers:
        - name: backend
          image: smart-emotion-journal-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: DB_HOST
              value: "postgres"
            - name: REDIS_HOST
              value: "redis:6379"
            - name: LLM_API_BASE
              value: "http://mlc-llm:8000/v1"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
